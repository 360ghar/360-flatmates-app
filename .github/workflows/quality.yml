name: Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  analyze_and_test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version-file: '.fvmrc'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # `.env` is gitignored but listed as an optional asset for local dotenv.
      # Create an empty placeholder so `flutter analyze` does not fail CI with
      # asset_does_not_exist (secrets stay out of the repo / CI artifacts).
      - name: Create placeholder .env for asset analysis
        run: touch .env

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Banned architecture patterns
        run: bash scripts/banned_patterns.sh

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: coverage/lcov.info
        continue-on-error: true
