# 360 FlatMates — Feature Test Suite (no auth)
# Assumes app is already logged in with an onboarded user
# Run: maestro test .maestro/feature_suite.yaml
#
# Prerequisites:
#   - App installed and logged in with a fully onboarded user
#   - At least 3 flatmate listings in the backend
#   - At least 1 existing conversation for chat testing

appId: com.the360ghar.flatmates
---
- launchApp

# Wait for home feed
- runFlow: flows/_helpers/wait_for_discover.yaml

# Feature flows
- runFlow: flows/features/01_discover.yaml
- runFlow: flows/features/02_search_filters.yaml
- runFlow: flows/features/03_flat_details.yaml
- runFlow: flows/features/04_explore_map.yaml
- runFlow: flows/features/05_swipe.yaml
- runFlow: flows/features/06_chats.yaml
- runFlow: flows/features/07_schedule_visit.yaml
- runFlow: flows/features/08_profile_view.yaml
- runFlow: flows/features/09_profile_edit.yaml
- runFlow: flows/features/10_settings.yaml
- runFlow: flows/features/11_notifications.yaml
- runFlow: flows/features/12_visits.yaml
- runFlow: flows/features/13_help_safety.yaml
