appId: com.the360ghar.flatmates360
name: Onboarding Completion Banner
tags:
  - onboarding
---
- launchApp:
    clearState: true

- runFlow: ../_shared/login.yaml

# If onboarding is incomplete, a banner CTA appears on the home screen.
- assertVisible:
    id: "onboarding_banner_cta"
    optional: true

- tapOn:
    id: "onboarding_banner_cta"
    optional: true
