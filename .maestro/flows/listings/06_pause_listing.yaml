appId: com.the360ghar.flatmates360
name: Listings - Pause Listing
tags:
  - listings
---
- launchApp:
    clearState: true
- runFlow: flows/_shared/login.yaml
- tap:
    id: nav_post_tab
- extendedWaitUntil:
    visible:
      id: post_hub_post_card
    timeout: 5000
- tap:
    id: post_hub_manage_card
- extendedWaitUntil:
    visible:
      id: manage_new_listing_button
    timeout: 5000
    optional: true
- scroll:
    direction: DOWN
    optional: true
- back:
    optional: true
