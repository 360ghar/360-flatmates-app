appId: com.the360ghar.flatmates360
name: Listings - Create Listing Step 0
tags:
  - listings
---
- launchApp:
    clearState: true
- runFlow: flows/_shared/login.yaml
- tap:
    id: nav_post_tab
- extendedWaitUntil:
    visible:
      id: post_hub_post_card
    timeout: 5000
- tap:
    id: post_hub_post_card
- extendedWaitUntil:
    visible:
      id: listing_society_input
    timeout: 5000
- tap:
    id: listing_society_input
- inputText: "Test Society"
- tap:
    id: listing_city_input
- inputText: "Bangalore"
- tap:
    id: listing_locality_input
- inputText: "Koramangala"
- tap:
    id: listing_next_button
- extendedWaitUntil:
    visible:
      id: listing_back_button
    timeout: 5000
- tap:
    id: listing_next_button
- tap:
    id: listing_next_button
- extendedWaitUntil:
    visible:
      id: listing_add_photos_tile
    timeout: 5000
