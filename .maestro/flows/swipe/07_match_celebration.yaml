appId: com.the360ghar.flatmates360
name: Swipe Deck - Match Celebration Dialog
tags:
  - swipe
---
- launchApp:
    clearState: true
- runFlow: flows/_shared/login.yaml
- tapOn:
    id: nav_swipe_tab
- extendedWaitUntil:
    visible:
      id: swipe_card
    timeout: 10000
- swipe:
    from:
      id: swipe_card
    direction: RIGHT
- extendedWaitUntil:
    visible:
      id: match_keep_swiping
    timeout: 3000
    optional: true
- tapOn:
    id: match_keep_swiping
    optional: true
- extendedWaitUntil:
    visible:
      id: swipe_card
    timeout: 5000
    optional: true
