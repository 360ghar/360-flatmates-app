appId: com.the360ghar.flatmates360
name: Swipe Deck - Undo Last Swipe
tags:
  - swipe
---
- launchApp:
    clearState: true
- runFlow: flows/_shared/login.yaml
- tapOn:
    id: nav_swipe_tab
- extendedWaitUntil:
    visible:
      id: swipe_card
    timeout: 10000
- swipe:
    from:
      id: swipe_card
    direction: LEFT
- tapOn:
    id: swipe_action_undo
- extendedWaitUntil:
    visible:
      id: swipe_card
    timeout: 5000
