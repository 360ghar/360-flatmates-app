appId: com.the360ghar.flatmates360
name: Swipe Deck - Swipe Left to Pass
tags:
  - swipe
---
- launchApp:
    clearState: true
- runFlow: flows/_shared/login.yaml
- tapOn:
    id: nav_swipe_tab
- extendedWaitUntil:
    visible:
      id: swipe_card
    timeout: 10000
- swipe:
    from:
      id: swipe_card
    direction: LEFT
- tapOn:
    id: match_keep_swiping
    optional: true
- extendedWaitUntil:
    visible:
      id: swipe_card
    timeout: 5000
