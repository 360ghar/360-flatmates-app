appId: com.the360ghar.flatmates360
name: Swipe Deck - Empty State After Swiping All
tags:
  - swipe
---
- launchApp:
    clearState: true
- runFlow: flows/_shared/login.yaml
- tapOn:
    id: nav_swipe_tab
- extendedWaitUntil:
    visible:
      id: swipe_card
    timeout: 10000
    optional: true
- swipe:
    from:
      id: swipe_card
    direction: LEFT
    optional: true
- swipe:
    from:
      id: swipe_card
    direction: LEFT
    optional: true
- swipe:
    from:
      id: swipe_card
    direction: LEFT
    optional: true
- swipe:
    from:
      id: swipe_card
    direction: LEFT
    optional: true
- swipe:
    from:
      id: swipe_card
    direction: LEFT
    optional: true
- assertVisible:
    id: nav_swipe_tab
