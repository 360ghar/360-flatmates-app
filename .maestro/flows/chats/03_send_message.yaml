appId: com.the360ghar.flatmates360
name: Chats - Send message
tags:
  - chats
---
- launchApp:
    clearState: true
- runFlow: flows/_shared/login.yaml
- tapOn:
    id: nav_inbox_tab
- extendedWaitUntil:
    visible:
      id: chats_chats_tab
    timeout: 5000
- extendedWaitUntil:
    visible:
      id: conversation_card_0
    timeout: 10000
- tapOn:
    id: conversation_card_0
- extendedWaitUntil:
    visible:
      id: chat_message_input
    timeout: 5000
- tapOn:
    id: chat_message_input
- inputText: "Hey, I'm interested in the room!"
- tapOn:
    id: chat_send_button
- extendedWaitUntil:
    visible: "Hey, I'm interested in the room!"
    timeout: 5000
- back
- extendedWaitUntil:
    visible:
      id: conversation_card_0
    timeout: 5000
