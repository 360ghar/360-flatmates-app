appId: com.the360ghar.flatmates360
name: Settings - Change Password
tags:
  - settings
---
- launchApp:
    clearState: true
- runFlow: flows/_shared/login.yaml
- tap:
    id: nav_me_tab
- extendedWaitUntil:
    visible:
      id: profile_edit_button
    timeout: 5000
- scrollUntilVisible:
    element:
      id: profile_settings_menu_item
    direction: DOWN
- tap:
    id: profile_settings_menu_item
- extendedWaitUntil:
    visible:
      id: settings_privacy_security_item
    timeout: 5000
- tap:
    id: settings_privacy_security_item
- extendedWaitUntil:
    visible:
      id: privacy_change_password_item
    timeout: 3000
- tap:
    id: privacy_change_password_item
# Change password page
- back
- back
- extendedWaitUntil:
    visible:
      id: profile_edit_button
    timeout: 5000
