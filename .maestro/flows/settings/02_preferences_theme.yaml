appId: com.the360ghar.flatmates360
name: Settings - Preferences Theme
tags:
  - settings
---
- launchApp:
    clearState: true
- runFlow: flows/_shared/login.yaml
- tap:
    id: nav_me_tab
- extendedWaitUntil:
    visible:
      id: profile_edit_button
    timeout: 5000
- scrollUntilVisible:
    element:
      id: preferences_menu_item
    direction: DOWN
- tap:
    id: preferences_menu_item
- extendedWaitUntil:
    visible:
      id: theme_mode_dark_option
    timeout: 5000
- tap:
    id: theme_mode_dark_option
- extendedWaitUntil:
    visible:
      id: theme_mode_light_option
    timeout: 2000
- tap:
    id: theme_mode_light_option
- back
