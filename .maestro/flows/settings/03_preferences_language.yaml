appId: com.the360ghar.flatmates360
name: Settings - Preferences Language
tags:
  - settings
---
- launchApp:
    clearState: true
- runFlow: flows/_shared/login.yaml
- tap:
    id: nav_me_tab
- extendedWaitUntil:
    visible:
      id: profile_edit_button
    timeout: 5000
- scrollUntilVisible:
    element:
      id: preferences_menu_item
    direction: DOWN
- tap:
    id: preferences_menu_item
- extendedWaitUntil:
    visible:
      id: language_hindi_option
    timeout: 5000
- tap:
    id: language_hindi_option
- extendedWaitUntil:
    visible:
      id: language_english_option
    timeout: 3000
- tap:
    id: language_english_option
- back
