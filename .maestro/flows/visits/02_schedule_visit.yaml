appId: com.the360ghar.flatmates360
name: Visits - Schedule visit from chat
tags:
  - chats
  - visits
---
- launchApp:
    clearState: true
- runFlow: flows/_shared/login.yaml
- tapOn:
    id: nav_inbox_tab
- extendedWaitUntil:
    visible:
      id: chats_chats_tab
    timeout: 5000
- extendedWaitUntil:
    visible:
      id: conversation_card_0
    timeout: 10000
- tapOn:
    id: conversation_card_0
- extendedWaitUntil:
    visible:
      id: chat_message_input
    timeout: 5000
- tapOn:
    id: chat_schedule_visit_button
- extendedWaitUntil:
    visible:
      id: visit_send_request_button
    timeout: 5000
- tapOn:
    id: visit_afternoon_slot
- tapOn:
    id: visit_note_input
- inputText: "Looking forward to the visit!"
- tapOn:
    id: visit_send_request_button
- extendedWaitUntil:
    visible:
      id: chat_message_input
    timeout: 5000
- back
- extendedWaitUntil:
    visible:
      id: conversation_card_0
    timeout: 5000
