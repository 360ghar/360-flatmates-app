appId: com.the360ghar.flatmates
---
# Feature: Visits Page
# Starting state: On any tab
- tapOn:
    id: "nav_profile_tab"
- extendedWaitUntil:
    visible:
      text: "Profile"
    timeout: 5000

# Navigate to My Schedule / Visits
- tapOn:
    text: "My Schedule"
    optional: true
- extendedWaitUntil:
    visible:
      text: "Visits"
    timeout: 5000

# Verify visits page loaded (may be empty)
- assertVisible:
    text: "Visits"
    optional: true
- assertVisible:
    text: "Confirmed"
    optional: true
- assertVisible:
    text: "Requested"
    optional: true

# Go back to profile
- back
