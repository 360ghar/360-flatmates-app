appId: com.the360ghar.flatmates
---
# Feature: Search & Filters
# Starting state: On Discover/Home tab
- assertVisible:
    id: "nav_home_tab"

# Open search filters page
- tapOn:
    id: "discover_filter_tune"
- extendedWaitUntil:
    visible:
      text: "Filters"
    timeout: 5000

# Select a room type filter (e.g., Private)
- tapOn:
    text: "Private"
    optional: true

# Select a furnishing filter
- tapOn:
    text: "Furnished"
    optional: true

# Show results
- tapOn:
    id: "search_show_results_button"
- extendedWaitUntil:
    visible:
      text: "Picked for You"
    timeout: 10000
