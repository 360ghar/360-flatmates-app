appId: com.the360ghar.flatmates
---
# Feature: Profile Edit
# Starting state: On Profile tab (may be scrolled down from previous flow)
- assertVisible:
    id: "nav_profile_tab"

# Scroll back up to ensure edit button is visible
- scroll:
    direction: UP

# Tap edit profile button
- tapOn:
    id: "profile_edit_button"
- extendedWaitUntil:
    visible:
      id: "profile_save_button"
    timeout: 5000

# Edit bio field
- tapOn:
    id: "profile_bio_input"
- eraseText
- inputText: "Updated bio from Maestro E2E test."

# Save profile
- tapOn:
    id: "profile_save_button"

# Verify we're back on profile page
- extendedWaitUntil:
    visible:
      id: "profile_edit_button"
    timeout: 5000
