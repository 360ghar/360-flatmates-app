appId: com.the360ghar.flatmates
---
# Feature: Logout
# Starting state: On any tab (navigates to profile first)
- tapOn:
    id: "nav_profile_tab"
- extendedWaitUntil:
    visible:
      text: "Profile"
    timeout: 5000

# Scroll to logout button
- scroll:
    direction: DOWN

# Tap logout
- tapOn:
    id: "logout_button"

# Verify we're back on the login/enter-phone screen
- extendedWaitUntil:
    visible:
      text: "Enter your phone"
    timeout: 10000
