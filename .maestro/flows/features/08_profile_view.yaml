appId: com.the360ghar.flatmates
---
# Feature: Profile View
# Starting state: On any tab
- tapOn:
    id: "nav_profile_tab"
- extendedWaitUntil:
    visible:
      text: "Profile"
    timeout: 5000

# Verify profile elements
- assertVisible:
    text: "Maestro User"
    optional: true
- assertVisible:
    text: "Co-Hunter"
    optional: true

# Verify menu items are visible
- assertVisible:
    text: "My Schedule"
    optional: true
- assertVisible:
    text: "Settings"
    optional: true
- assertVisible:
    text: "Help"
    optional: true

# Scroll to see all menu items
- scroll:
    direction: DOWN
- assertVisible:
    text: "Logout"
    optional: true
