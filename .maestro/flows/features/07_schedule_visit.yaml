appId: com.the360ghar.flatmates
---
# Feature: Schedule Visit (from chat thread)
# Starting state: Inside a chat thread (continued from 06_chats)
# If not in a chat thread, try to navigate to one

# Open chat thread if not already in one
- tapOn:
    id: "nav_likes_chat_tab"
- tapOn:
    id: "chats_chats_tab"
- tapOn:
    text: "Maestro"
    optional: true

# Tap schedule visit button in chat app bar
- tapOn:
    id: "chat_schedule_visit_button"
    optional: true

# If schedule visit page opened, fill the form
- assertVisible:
    text: "Schedule"
    optional: true

# Select afternoon time slot
- tapOn:
    id: "visit_afternoon_slot"
    optional: true

# Add a note
- tapOn:
    id: "visit_note_input"
    optional: true
- inputText: "Looking forward to the visit!"

# Send request
- tapOn:
    id: "visit_send_request_button"
    optional: true

# Go back
- back
- back
