appId: com.the360ghar.flatmates
---
# Feature: Notifications
# Starting state: On any tab
- assertVisible:
    id: "nav_home_tab"

# Navigate to notifications via discover header bell
- tapOn:
    id: "nav_home_tab"
- tapOn:
    id: "discover_notifications_button"
- extendedWaitUntil:
    visible:
      text: "Notifications"
    timeout: 5000

# Verify notification list (may be empty)
- assertVisible:
    text: "Notifications"
    optional: true

# Mark all as read if button exists
- tapOn:
    id: "notification_mark_all_read"
    optional: true

# Go back
- back
