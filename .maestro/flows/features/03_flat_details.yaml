appId: com.the360ghar.flatmates
---
# Feature: Flat Details
# Starting state: On Discover/Home tab with listings visible
- assertVisible:
    id: "nav_home_tab"

# Tap the first listing card to view details (use index-based tap since card IDs are dynamic)
- tapOn:
    index: 0
    text: "month"
    optional: true

# If flat details page opened, verify content
- assertVisible:
    text: "About"
    optional: true
- assertVisible:
    id: "flat_contact_button"
    optional: true

# Scroll through flat details
- scroll:
    direction: DOWN
- scroll:
    direction: DOWN

# Go back to discover
- back
- extendedWaitUntil:
    visible:
      id: "nav_home_tab"
    timeout: 5000
