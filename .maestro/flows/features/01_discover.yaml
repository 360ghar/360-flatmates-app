appId: com.the360ghar.flatmates
---
# Feature: Discover / Home Feed
# Starting state: On Discover/Home tab
- assertVisible:
    id: "nav_home_tab"

# Verify greeting and feed sections
- assertVisible:
    text: "Hi"
    optional: true
- assertVisible:
    text: "Picked for You"
    optional: true

# Scroll feed to see more listings
- scroll:
    direction: DOWN
- scroll:
    direction: DOWN

# Tap a filter chip (first one visible)
- tapOn:
    text: "Nearby"
    optional: true

# Wait for filtered results
- extendedWaitUntil:
    visible:
      text: "Picked for You"
    timeout: 5000

# Tap notification bell
- tapOn:
    id: "discover_notifications_button"
- extendedWaitUntil:
    visible:
      text: "Notifications"
    timeout: 5000
- back
