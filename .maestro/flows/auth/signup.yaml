appId: com.the360ghar.flatmates
---
# Create a new account via the unified OTP-first flow:
# enter phone → OTP verify → mandatory set-password.
# Prerequisites: App is on the Enter Phone screen, seeded OTP is 123456
# Requires env vars: MAESTRO_PHONE, MAESTRO_PASSWORD
- assertVisible:
    text: "Enter your phone"
- tapOn:
    id: "enter_phone_input"
- eraseText
- inputText: ${MAESTRO_PHONE}
- tapOn:
    id: "terms_checkbox"
- tapOn:
    id: "enter_phone_continue_cta"
- extendedWaitUntil:
    visible:
      id: "otp_digit_0"
    timeout: 10000
- tapOn:
    id: "otp_digit_0"
- inputText: "123456"
- extendedWaitUntil:
    visible:
      id: "set_password_input"
    timeout: 10000
- tapOn:
    id: "set_password_input"
- inputText: ${MAESTRO_PASSWORD}
- tapOn:
    id: "set_password_confirm_input"
- inputText: ${MAESTRO_PASSWORD}
- tapOn:
    id: "set_password_submit_button"
