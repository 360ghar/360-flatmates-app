appId: com.the360ghar.flatmates
---
# Login with phone + OTP (unified entry flow).
# OTP is only offered to accounts without a password (or unverified); a
# password-backed account is routed to the password screen instead — use
# login_password.yaml for that case.
# Prerequisites: App is on the Enter Phone screen; the account for
# MAESTRO_PHONE is passwordless or unverified; seeded OTP is 123456.
# Requires env var: MAESTRO_PHONE
- assertVisible:
    text: "Enter your phone"
- tapOn:
    id: "enter_phone_input"
- eraseText
- inputText: ${MAESTRO_PHONE}
- tapOn:
    id: "terms_checkbox"
- tapOn:
    id: "enter_phone_continue_cta"
- extendedWaitUntil:
    visible:
      id: "otp_digit_0"
    timeout: 10000
- tapOn:
    id: "otp_digit_0"
- inputText: "123456"
