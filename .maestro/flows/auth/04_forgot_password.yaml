appId: com.the360ghar.flatmates360
name: Forgot Password
tags:
  - auth
---
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      id: "enter_phone_input"
    timeout: 10000

- tapOn:
    id: "enter_phone_input"
- inputText: ${MAESTRO_PHONE}

- tapOn:
    id: "terms_checkbox"
    optional: true

- tapOn:
    id: "enter_phone_continue_cta"

- extendedWaitUntil:
    visible:
      id: "login_password_input"
    timeout: 10000

- tapOn:
    text: ".*Forgot.*"
    optional: true

- extendedWaitUntil:
    visible:
      id: "forgot_password_phone_input"
    timeout: 10000

- tapOn:
    id: "forgot_password_phone_input"
- inputText: ${MAESTRO_PHONE}

- tapOn:
    id: "forgot_password_send_otp"

- extendedWaitUntil:
    visible:
      id: "reset_new_password_input"
    timeout: 10000
