appId: com.the360ghar.flatmates360
name: Login Phone
tags:
  - smoke
  - auth
---
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      id: "enter_phone_input"
    timeout: 10000

- tapOn:
    id: "enter_phone_input"
- inputText: ${MAESTRO_PHONE}

- tapOn:
    id: "terms_checkbox"
    optional: true

- tapOn:
    id: "enter_phone_continue_cta"

- extendedWaitUntil:
    visible:
      id: "login_password_input"
    timeout: 10000

- tapOn:
    id: "login_password_input"
- inputText: ${MAESTRO_PASSWORD}

- tapOn:
    id: "login_submit_button"

- extendedWaitUntil:
    visible:
      id: "nav_home_tab"
    timeout: 15000
