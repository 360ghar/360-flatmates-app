appId: com.the360ghar.flatmates
---
# Login with phone + password (unified entry flow).
# The enter-phone screen checks the identifier status; a registered, verified
# account with a password is routed to the password screen — no OTP is sent.
# Prerequisites: App is on the Enter Phone screen; the account for
# MAESTRO_PHONE is registered, verified, and has a password.
# Requires env vars: MAESTRO_PHONE, MAESTRO_PASSWORD
- assertVisible:
    text: "Enter your phone"
- tapOn:
    id: "enter_phone_input"
- eraseText
- inputText: ${MAESTRO_PHONE}
- tapOn:
    id: "terms_checkbox"
- tapOn:
    id: "enter_phone_continue_cta"
- extendedWaitUntil:
    visible:
      id: "login_password_input"
    timeout: 10000
- tapOn:
    id: "login_password_input"
- inputText: ${MAESTRO_PASSWORD}
- tapOn:
    id: "login_submit_button"
