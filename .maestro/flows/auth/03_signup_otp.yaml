appId: com.the360ghar.flatmates360
name: Signup OTP
tags:
  - auth
---
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      id: "enter_phone_input"
    timeout: 10000

- tapOn:
    id: "enter_phone_input"
- inputText: ${MAESTRO_PHONE}

- tapOn:
    id: "terms_checkbox"
    optional: true

- tapOn:
    id: "enter_phone_continue_cta"

- extendedWaitUntil:
    visible:
      id: "otp_submit_button"
    timeout: 10000

- tapOn:
    id: "otp_input"
    optional: true
- inputText: "123456"

- tapOn:
    id: "otp_submit_button"

- extendedWaitUntil:
    visible:
      id: "set_password_input"
    timeout: 10000

- tapOn:
    id: "set_password_input"
- inputText: ${MAESTRO_PASSWORD}

- tapOn:
    id: "set_password_confirm_input"
- inputText: ${MAESTRO_PASSWORD}

- tapOn:
    id: "set_password_submit_button"

- extendedWaitUntil:
    visible:
      id: "nav_home_tab"
    timeout: 15000
