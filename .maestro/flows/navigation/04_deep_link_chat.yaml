appId: com.the360ghar.flatmates360
name: Navigation Deep Link Chat
tags:
  - navigation
---
- launchApp:
    clearState: true

- runFlow: ../_shared/login.yaml

- tapOn:
    id: "nav_inbox_tab"

- extendedWaitUntil:
    visible:
      id: "chats_chats_tab"
    timeout: 5000

- extendedWaitUntil:
    visible:
      id: "conversation_card_0"
    timeout: 10000

- tapOn:
    id: "conversation_card_0"
    optional: true

- extendedWaitUntil:
    visible:
      id: "chat_message_input"
    timeout: 5000
