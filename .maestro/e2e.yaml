# 360 FlatMates — Full E2E Smoke Suite (Sequential)
#
# Seeded room-poster login → smoke flows → logout.
# Run: maestro test .maestro/e2e.yaml
#
# Prerequisites:
#   - Seeded backend with an already-onboarded room_poster account
#   - MAESTRO_PHONE and MAESTRO_PASSWORD exported in the shell
#   - Completed onboarding for the seeded account
#   - At least 3 discover listings in the backend
#   - At least 1 existing conversation for chat/schedule testing
#   - At least 1 visit in the backend for visit actions

appId: com.the360ghar.flatmates360
name: Full E2E Smoke
tags:
  - smoke
---
- launchApp:
    clearState: true

# Auth
- runFlow: flows/auth/01_login_phone.yaml

# Navigation
- runFlow: flows/navigation/01_tabs_co_hunter.yaml

# Discover
- runFlow: flows/discover/01_home_feed.yaml
- runFlow: flows/discover/06_search_filters.yaml
- runFlow: flows/discover/03_flat_details.yaml

# Swipe
- runFlow: flows/swipe/01_swipe_deck_load.yaml
- runFlow: flows/swipe/02_swipe_like.yaml

# Chats
- runFlow: flows/chats/01_conversations_tabs.yaml
- runFlow: flows/chats/02_open_chat.yaml
- runFlow: flows/chats/03_send_message.yaml
- runFlow: flows/chats/02_schedule_visit.yaml

# Profile & Settings
- runFlow: flows/profile/01_profile_view.yaml
- runFlow: flows/profile/02_edit_profile.yaml
- runFlow: flows/settings/01_settings_page.yaml
- runFlow: flows/settings/02_preferences_theme.yaml
- runFlow: flows/profile/04_help_safety.yaml

# Notifications
- runFlow: flows/notifications/01_notifications_list.yaml

# Listings (room_poster mode)
- runFlow: flows/listings/01_post_hub.yaml
- runFlow: flows/listings/02_create_listing_step0.yaml

# Logout
- runFlow: flows/auth/07_logout.yaml
